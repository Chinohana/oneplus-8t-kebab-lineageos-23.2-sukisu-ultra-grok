name: Build kebab kernel with SukiSU-Ultra

on:
  workflow_dispatch:
    inputs:
      kernel_ref:
        description: LineageOS kernel branch, tag, or commit
        required: true
        default: lineage-23.2
        type: string
      sukisu_ref:
        description: SukiSU-Ultra tag or commit
        required: true
        default: v4.1.3
        type: string
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-kernel.yml
      - configs/**
      - packaging/**
      - patches/**
      - scripts/**

permissions:
  contents: read

concurrency:
  group: kebab-kernel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: LineageOS 23.2 / kebab / SukiSU-Ultra
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      KERNEL_REF: ${{ inputs.kernel_ref || 'lineage-23.2' }}
      SUKISU_REF: ${{ inputs.sukisu_ref || 'v4.1.3' }}
      CLANG_VERSION: clang-r563880c
      AOSP_TAG: android-16.0.0_r4
      KERNEL_DIR: /tmp/kebab-kernel
      OUT_DIR: /tmp/kebab-out
      TOOLCHAIN_DIR: /tmp/kebab-clang

    steps:
      - name: Check out build configuration
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            bc bison build-essential ca-certificates curl device-tree-compiler \
            flex git libelf-dev libssl-dev lz4 python3 rsync unzip zip zstd

      - name: Fetch LineageOS kernel source
        run: |
          git init "${KERNEL_DIR}"
          git -C "${KERNEL_DIR}" remote add origin \
            https://github.com/LineageOS/android_kernel_oneplus_sm8250.git
          git -C "${KERNEL_DIR}" fetch --depth=1 origin "${KERNEL_REF}"
          git -C "${KERNEL_DIR}" checkout --detach FETCH_HEAD

      - name: Fetch the LineageOS 23.2 Clang toolchain
        run: |
          git clone --depth=1 --filter=blob:none --sparse --branch "${AOSP_TAG}" \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            "${RUNNER_TEMP}/clang-prebuilts"
          git -C "${RUNNER_TEMP}/clang-prebuilts" sparse-checkout set "${CLANG_VERSION}"
          mv "${RUNNER_TEMP}/clang-prebuilts/${CLANG_VERSION}" "${TOOLCHAIN_DIR}"
          "${TOOLCHAIN_DIR}/bin/clang" --version

      - name: Build kernel
        run: bash scripts/build-kernel.sh

      - name: Package AnyKernel3 ZIP
        run: bash scripts/package-anykernel.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kebab-lineage-23.2-sukisu-ultra-${{ env.KERNEL_SHA }}
          path: dist/
          if-no-files-found: error
          compression-level: 6
          retention-days: 14
